name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      # ponytail: full `npm run lint` has legacy react-hooks debt; lint docs paths until follow-up
      - run: npx eslint src/lib/docs
      - run: npm run test:run
      - run: npm run build
